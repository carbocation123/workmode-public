name: Publish Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to write, build, sign and publish (for example 0.2.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Synchronize release version
        id: version
        shell: pwsh
        run: |
          $version = '${{ inputs.version }}'.Trim()
          ./scripts/sync-version.ps1 -Version $version
          git add VERSION `
            frontend/package.json frontend/package-lock.json `
            desktop/package.json desktop/package-lock.json `
            desktop/src-tauri/tauri.conf.json `
            desktop/src-tauri/Cargo.toml desktop/src-tauri/Cargo.lock
          if ($LASTEXITCODE -ne 0) { throw 'Failed to stage synchronized version files.' }
          $stagedVersionFiles = @(git diff --cached --name-only)
          if ($LASTEXITCODE -ne 0) { throw 'Failed to inspect synchronized version files.' }
          if ($stagedVersionFiles.Count -gt 0) {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m "chore: release v$version"
            if ($LASTEXITCODE -ne 0) { throw 'Failed to commit synchronized version files.' }
            git push origin "HEAD:${{ github.ref_name }}"
            if ($LASTEXITCODE -ne 0) { throw 'Failed to push synchronized version files.' }
          }
          "sha=$(git rev-parse HEAD)" >> $env:GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Prepare Rust
        shell: pwsh
        run: |
          rustup default stable
          if ($LASTEXITCODE -ne 0) { throw 'Failed to select the Rust toolchain.' }
          rustup target add x86_64-pc-windows-msvc
          if ($LASTEXITCODE -ne 0) { throw 'Failed to install the Rust Windows target.' }
          rustup component add rustfmt
          if ($LASTEXITCODE -ne 0) { throw 'Failed to install rustfmt.' }

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv backend/.venv
          if ($LASTEXITCODE -ne 0) { throw 'Failed to create the backend virtualenv.' }
          backend/.venv/Scripts/python.exe -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { throw 'Failed to upgrade pip.' }
          backend/.venv/Scripts/python.exe -m pip install -r backend/requirements.txt
          if ($LASTEXITCODE -ne 0) { throw 'Failed to install backend dependencies.' }
          npm ci --prefix frontend
          if ($LASTEXITCODE -ne 0) { throw 'Failed to install frontend dependencies.' }
          npm ci --prefix desktop
          if ($LASTEXITCODE -ne 0) { throw 'Failed to install desktop dependencies.' }

      - name: Restore updater signing key
        shell: pwsh
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.WORKMODE_UPDATER_PRIVATE_KEY }}
          UPDATER_PASSWORD: ${{ secrets.WORKMODE_UPDATER_PASSWORD }}
        run: |
          if (-not $env:UPDATER_PRIVATE_KEY -or -not $env:UPDATER_PASSWORD) {
            throw 'Updater signing secrets are not configured.'
          }
          New-Item -ItemType Directory -Force .release-secrets | Out-Null
          [IO.File]::WriteAllText((Join-Path $PWD '.release-secrets/workmode-public-updater.key'), $env:UPDATER_PRIVATE_KEY)
          [IO.File]::WriteAllText((Join-Path $PWD '.release-secrets/updater-password.txt'), $env:UPDATER_PASSWORD)

      - name: Build signed desktop release
        shell: pwsh
        run: |
          $version = '${{ inputs.version }}'.Trim()
          ./scripts/build-desktop.ps1 `
            -Version $version `
            -UpdateEndpoint 'https://github.com/carbocation123/workmode-public/releases/latest/download/latest.json' `
            -ArtifactBaseUrl "https://github.com/carbocation123/workmode-public/releases/download/v$version" `
            -ReleaseNotes "Workmode Public $version"

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ inputs.version }}'.Trim()
          $tag = "v$version"
          $files = Get-ChildItem "release/desktop-$version" -File | ForEach-Object { $_.FullName }
          gh release view $tag --repo '${{ github.repository }}' *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files `
              --repo '${{ github.repository }}' `
              --clobber
            if ($LASTEXITCODE -ne 0) { throw 'Failed to replace release assets.' }
            gh release edit $tag `
              --repo '${{ github.repository }}' `
              --title "Workmode Public $version" `
              --latest
          } else {
            gh release create $tag @files `
              --repo '${{ github.repository }}' `
              --target '${{ steps.version.outputs.sha }}' `
              --title "Workmode Public $version" `
              --generate-notes
          }
          if ($LASTEXITCODE -ne 0) { throw 'Failed to publish GitHub Release.' }
